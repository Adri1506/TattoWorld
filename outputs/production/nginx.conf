# ==============================================================
# Nginx Configuration - TattoWorld Static Site
# Optimized for static file serving with security headers
# ==============================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Security Headers
    # ----------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # ----------------------------------------------------------
    # Gzip Compression
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ----------------------------------------------------------
    # Caching Strategy
    # ----------------------------------------------------------

    # Static assets (CSS, JS, images) - aggressive caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML files - no caching (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Manifest and service worker
    location ~* (manifest\.json|service-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----------------------------------------------------------
    # Security - Block sensitive files
    # ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|htaccess|htpasswd)$ {
        deny all;
    }

    # ----------------------------------------------------------
    # Default location
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ----------------------------------------------------------
    # Custom error pages
    # ----------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ----------------------------------------------------------
    # Logging
    # ----------------------------------------------------------
    access_log /var/log/nginx/tattoworld_access.log;
    error_log /var/log/nginx/tattoworld_error.log;
}
