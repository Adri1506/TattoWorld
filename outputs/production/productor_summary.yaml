project:
  name: "TattoWorld"
  version: "1.0.0"
  type: "Static Multi-page Website (MPA)"
  language: "HTML5 + CSS3 + JavaScript ES2024"
  framework: "Tailwind CSS (local)"
  database: "N/A"

stack_containerized:
  language: "HTML5"
  framework: "Nginx 1.27 Alpine"
  base_image: "node:20-alpine (builder stage)"
  runner_image: "nginx:1.27-alpine (production stage)"

deploy_target:
  platform: "Multiple (GitHub Pages recommended)"
  justification: "Static site with no backend; GitHub Pages is free and fits the project constraints (no budget for hosting)."

files_generated:
  - "outputs/production/Dockerfile"
  - "outputs/production/nginx.conf"
  - "outputs/production/docker-compose.dev.yml"
  - "outputs/production/docker-compose.prod.yml"
  - "outputs/production/.dockerignore"
  - "outputs/production/.env.example"
  - "outputs/production/deploy.sh"
  - "outputs/production/RELEASE_CHECKLIST.md"
  - "outputs/production/.github/workflows/deploy.yml"
  - "outputs/production/platform/vercel.json"
  - "outputs/production/platform/netlify.toml"
  - "outputs/production/platform/railway.toml"
  - "outputs/production/platform/fly.toml"
  - "outputs/production/productor_summary.yaml"
  - "outputs/production/productor_report.md"

environment_variables:
  total_required: 3
  total_optional: 4
  variables:
    - name: "SITE_URL"
      description: "Production URL of the website"
      required: true
      example_value: "https://tattoworld.cl"
    - name: "WHATSAPP_PHONE"
      description: "WhatsApp phone number for contact button"
      required: true
      example_value: "+56912345678"
    - name: "FORMSPREE_FORM_ID"
      description: "Formspree form ID for contact submissions"
      required: true
      example_value: "xrgbqzqn"
    - name: "BUSINESS_EMAIL"
      description: "Business email for Schema.org"
      required: false
      example_value: "contacto@tattoworld.cl"
    - name: "BUSINESS_PHONE"
      description: "Business phone for Schema.org"
      required: false
      example_value: "+56912345678"
    - name: "BUSINESS_ADDRESS"
      description: "Business address for Schema.org"
      required: false
      example_value: "Santiago, Chile"
    - name: "DEPLOY_TARGET"
      description: "Target deployment platform"
      required: false
      example_value: "github-pages"

docker_info:
  dockerfile_stages: 2
  exposed_port: 80
  health_check_endpoint: "/"
  runs_as_root: false
  non_root_user: "tattoworld (uid: 1001)"
  memory_limit: "128M"
  cpu_limit: "0.5 cores"

nginx_config:
  gzip_compression: true
  security_headers: true
  caching_strategy: "aggressive for static assets, no-cache for HTML"
  blocked_paths: [".env", ".git", "htaccess"]

pre_deploy_warnings:
  - "SC-003: Rate limiting is client-side only; consider server-side for production"
  - "SC-004: CAPTCHA is basic math; consider reCAPTCHA for stronger protection"
  - "SC-007: Phone number is intentionally public (business requirement)"
  - "Images may need manual optimization with Squoosh for best performance"

security_findings_pending: []

qa_status:
  all_checks_passed: true
  blocking_findings_fixed: 3
  ready_for_next: true

ready_for_deploy: true
confidence_level: "high"

recommendations:
  - priority: "medium"
    action: "Optimize images with Squoosh before production"
    reason: "Reduce page load time and improve SEO"
  - priority: "low"
    action: "Add CSP headers via nginx.conf"
    reason: "Enhance security posture"
  - priority: "info"
    action: "Consider server-side rate limiting"
    reason: "Client-side can be bypassed"
