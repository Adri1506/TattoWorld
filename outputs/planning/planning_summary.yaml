    phase_ref: PH01
    epic_ref: E01
    feature_ref: F01
    scenario_ref: F01-S01
    title: Crear estructura de directorios
    description: Crear la estructura completa de carpetas del proyecto TattoWorld.
    objective: Tener la estructura base para organizar todos los archivos.
    inputs:
      - architecture_summary.yaml
    outputs:
      - Estructura de carpetas creada
    acceptance_criteria:
      - Existencia de carpetas: assets/css/, assets/js/, assets/img/, assets/img/gallery/, assets/img/icons/, pages/
      - Todas las carpetas están vacías y listas para recibir archivos
    dependencies: []
    estimated_complexity: low

  - id: T02
    phase_ref: PH01
    epic_ref: E01
    feature_ref: F02
    scenario_ref: F02-S01
    title: Optimizar imágenes para web
    description: Procesar las 6 imágenes de evidencias/ con Squoosh para web.
    objective: Reducir tamaño de imágenes sin perder calidad visual.
    inputs:
      - evidencias/foto1.png a foto6.png
    outputs:
      - Imágenes webp optimizadas en assets/img/gallery/
    acceptance_criteria:
      - Cada imagen webp pesa menos de 200KB
      - Se generan thumbnails de 400x400px (menos de 50KB)
      - Las imágenes originales se mantienen en evidencias/
    dependencies:
