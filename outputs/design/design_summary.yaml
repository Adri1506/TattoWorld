design_complexity:
  screens_count: 4
  component_count: 18
  flow_count: 4
  complexity: "low"

assumptions:
  - "El usuario validó el estilo visual propuesto (oscuro + dorado)"
  - "Las fotos en evidencias/ son adecuadas para la galería"
  - "El usuario tiene logo o se creará uno simple"
  - "WhatsApp Business está configurado"
  - "Formspree está configurado para recibir emails"
  - "El usuario quiere mostrar precios"

constraints:
  - "Stack tecnológico no modificable (Tailwind CDN, AOS, Lucide)"
  - "Máximo 4 páginas principales"
  - "Contenido en español (Chile/Latam)"
  - "Diseño mobile-first obligatorio"
  - "Formulario simple (máximo 5 campos)"
  - "Botón WhatsApp siempre visible"

ready_for_next: true
