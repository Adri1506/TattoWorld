ui_library:
  name: "Tailwind CSS (CDN) + Custom Components"
  justification: >
    Stack ya definido por el Architect. Tailwind permite desarrollo
    rápido de UI responsive sin build step. Componentes custom
    (lightbox, filter gallery) se implementan con JavaScript vanilla.

