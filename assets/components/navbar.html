<!-- Navbar Component -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
  <div class="container mx-auto px-4 md:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">
      
      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-2xl md:text-3xl font-bold text-accent">Tatto</span>
        <span class="text-2xl md:text-3xl font-bold text-text-primary">World</span>
      </a>
      
      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium">
          Inicio
        </a>
        <a href="pages/servicios.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium">
          Servicios
        </a>
        <a href="pages/galeria.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium">
          Galería
        </a>
        <a href="pages/contacto.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium">
          Contacto
        </a>
        <a href="pages/contacto.html" class="btn btn-primary text-sm">
          Agendar Cita
        </a>
      </div>
      
      <!-- Mobile Menu Button -->
      <button id="mobile-menu-btn" class="md:hidden p-2 text-text-secondary hover:text-accent transition-colors" aria-label="Abrir menú de navegación" aria-expanded="false">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
    </div>
  </div>
  
  <!-- Mobile Navigation -->
  <div id="mobile-menu" class="md:hidden hidden bg-surface border-t border-border">
    <div class="container mx-auto px-4 py-4">
      <div class="flex flex-col gap-4">
        <a href="index.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium py-2">
          Inicio
        </a>
        <a href="pages/servicios.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium py-2">
          Servicios
        </a>
        <a href="pages/galeria.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium py-2">
          Galería
        </a>
        <a href="pages/contacto.html" class="nav-link text-text-secondary hover:text-accent transition-colors duration-200 font-medium py-2">
          Contacto
        </a>
        <a href="pages/contacto.html" class="btn btn-primary text-sm mt-2">
          Agendar Cita
        </a>
      </div>
    </div>
  </div>
</nav>

<script>
  // Navbar scroll effect
  const navbar = document.getElementById('navbar');
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  
  // Scroll effect
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('bg-surface/95', 'backdrop-blur-md', 'shadow-lg');
      navbar.classList.remove('bg-transparent');
    } else {
      navbar.classList.remove('bg-surface/95', 'backdrop-blur-md', 'shadow-lg');
      navbar.classList.add('bg-transparent');
    }
  });
  
  // Mobile menu toggle
  mobileMenuBtn.addEventListener('click', () => {
    const isExpanded = mobileMenuBtn.getAttribute('aria-expanded') === 'true';
    mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
    mobileMenu.classList.toggle('hidden');
    
    // Change icon
    const icon = mobileMenuBtn.querySelector('i');
    if (isExpanded) {
      icon.setAttribute('data-lucide', 'menu');
    } else {
      icon.setAttribute('data-lucide', 'x');
    }
    lucide.createIcons();
  });
  
  // Close mobile menu on link click
  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.add('hidden');
      mobileMenuBtn.setAttribute('aria-expanded', 'false');
      const icon = mobileMenuBtn.querySelector('i');
      icon.setAttribute('data-lucide', 'menu');
      lucide.createIcons();
    });
  });
  
  // Set active nav link based on current page
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(link => {
    const href = link.getAttribute('href').split('/').pop();
    if (href === currentPage || (currentPage === '' && href === 'index.html')) {
      link.classList.add('text-accent');
      link.classList.remove('text-text-secondary');
    }
  });
</script>
